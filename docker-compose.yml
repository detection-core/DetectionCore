services:
  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: dc_mongo
    restart: unless-stopped
    # MongoDB only accessible internally — no host port exposed
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dc_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGODB_URI: "mongodb://mongo:27017"
      # ELK 8.x is running as es01 on host — HTTPS with self-signed cert
      ELK_HOST: "host.docker.internal"
      ELK_PORT: "9200"
      ELK_USE_SSL: "true"
    ports:
      - "8080:8000"   # 8000 used by detectionhub-api
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./backend:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Frontend (React + Nginx) ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dc_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongo_data:

networks:
  default:
    name: detectioncore_net
